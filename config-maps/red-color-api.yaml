apiVersion: v1
kind: Pod
metadata:
  name: red-color-api
  labels:
    app: red-color-api
spec:
  containers:
  - name: color-api
    image: saputra523/color-api:1.3.0
    # envFrom: if we want to ignore the mapping
    #   - configMapKeyRef:
    #       name: red-config
    env:
      - name: DEFAULT_COLOR # mapping for more decoupling on config map values
        valueFrom:
          configMapKeyRef:
            key: COLOR
            name: red-config
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
    
