apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-api
spec:
  selector:
    matchLabels:
      app: color-api
  template:
    metadata:
      labels:
        app: color-api
    spec:
      containers:
      - name: color-api
        image: saputra523/color-api:1.2.1
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: color-api-svc
spec:
  selector:
    app: color-api
  ports:
  - port: 80
    targetPort: 80

