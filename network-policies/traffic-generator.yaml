apiVersion: v1
kind: Pod
metadata:
  name: traffic-generator
  namespace: dev
  labels:
    app: traffic-generator
spec:
  containers:
  - name: traffic-generator
    image: saputra523/traffic-gen:1.0.0
    args:
      - 'color-api-svc.default.svc.cluster.local' # <service_name>.<namespace>.svc
      - '0.5'
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"

