apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-api-depl
  namespace: dev
  labels:
    app: color-api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: color-api
  template:
    metadata:
      labels:
        app: color-api
    spec:
      containers:
      - name: color-api
        image: saputra523/color-api:1.1.0
        resources:
          requests:
            cpu: '200m'
            memory: '128Mi'
          limits:
            cpu: '400m'
            memory: '256Mi'
        ports:
          - containerPort: 80
