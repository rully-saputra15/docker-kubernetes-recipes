apiVersion: v1
kind: Pod
metadata:
  name: busybox
  labels:
    app.kubernetes.io/name: busybox
spec:
  containers:
  - name: busybox
    image: busybox:1.36.1
    command:
      - 'sh'
      - '-c'
      - 'sleep 1800'
    # envFrom:
    #   - secretRef:
    #       name: db-creds
    # env:
    #   - name: DB_USER
    #     valueFrom:
    #       secretKeyRef:
    #         key: username
    #         name: db-creds
    #   - name: DB_PASSWORD
    #     valueFrom:
    #       secretKeyRef:
    #         key: password
    #         name: db-creds
    volumeMounts:
      - name: db-secrets
        mountPath: /etc/db
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
  volumes:
    - name: db-secrets
      secret:
        secretName: db-creds
        items:
          - key: password
            path: dev/password
